<!DOCTYPE html>
<html lang="pt-BR" class="pagina-cadastro-paciente">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicatriza+ - Cadastrar Paciente</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importação da fonte Montserrat -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pagina-cadastro-paciente">

    <div class="dashboard-wrapper">
        
        <!-- BARRA LATERAL (SIDEBAR) -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand-logo">
                    <span class="logo-icon">🩹</span>
                    <h1 class="logo-text">Cicatriza<span class="plus-sign">+</span></h1>
                </div>

                <div class="user-profile-summary">
                    <div class="profile-avatar">m</div>
                    <div class="profile-info">
                        <p class="user-name">Maria Silva</p>
                        <p class="user-role">Enfermeira COREN(DF)</p>
                    </div>
                </div>

                <nav class="sidebar-menu">
                    <a href="#" class="menu-item">
                        <span class="item-icon">🎛️</span> Área de trabalho
                    </a>
                    <a href="#" class="menu-item active">
                        <span class="item-icon">👤➕</span> Cadastrar paciente
                    </a>
                    <a href="#" class="menu-item">
                        <span class="item-icon">👥</span> Meus pacientes
                    </a>
                </nav>
            </div>

            <div class="sidebar-bottom">
                <a href="#" class="menu-item">
                    <span class="item-icon">⚙️</span> Configurações
                </a>
                <a href="#" class="menu-item logout">
                    <span class="item-icon">↪️</span> Sair da conta
                </a>
            </div>
        </aside>

        <!-- ÁREA PRINCIPAL DO CONTEÚDO -->
        <main class="main-content">
            
            <!-- Botão de Status Superior -->
            <div class="status-top-card">
                <div class="status-left">
                    <div class="icon-bg">👤➕</div>
                    <div class="status-text">
                        <h3>Cadastrar paciente</h3>
                        <p>Registre um novo paciente e inicie o acompanhamento de feridas</p>
                    </div>
                </div>
                <div class="status-arrow">→</div>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <form class="patient-form">
                
                <!-- Bloco de Grid Principal -->
                <div class="form-grid">
                    
                    <!-- Coluna da Esquerda (Maior parte dos dados) -->
                    <div class="form-left-col">
                        <div class="input-group full-width">
                            <label for="nome">NOME COMPLETO</label>
                            <input type="text" id="nome" placeholder="Digite seu nome completo">
                        </div>

                        <div class="form-subrow four-cols">
                            <div class="input-group">
                                <label for="prontuario">PRONTUÁRIO</label>
                                <input type="text" id="prontuario" placeholder="Nº do prontuário">
                            </div>
                            <div class="input-group">
                                <label for="leito">LEITO</label>
                                <input type="text" id="leito" placeholder="Ex: 12-A">
                            </div>
                            <div class="input-group">
                                <label for="data-cadastro">DATA DO CADASTRO</label>
                                <input type="text" id="data-cadastro" placeholder="DD/MM/AAAA">
                            </div>
                            <div class="input-group">
                                <label for="nascimento">NASCIMENTO</label>
                                <input type="text" id="nascimento" placeholder="DD/MM/AAAA">
                            </div>
                        </div>

                        <div class="form-subrow two-cols">
                            <div class="input-group">
                                <label for="escolaridade">ESCOLARIDADE</label>
                                <input type="text" id="escolaridade" placeholder="Ex: Ensino superior completo">
                            </div>
                            <div class="input-group">
                                <label for="genero">GÊNERO</label>
                                <input type="text" id="genero" placeholder="Ex: Masculino">
                            </div>
                        </div>

                        <div class="form-subrow two-cols">
                            <div class="input-group">
                                <label for="telefone">TELEFONE</label>
                                <input type="text" id="telefone" placeholder="Ex: (61)99999-9999">
                            </div>
                            <div class="input-group">
                                <label for="estado-civil">ESTADO CIVIL</label>
                                <input type="text" id="estado-civil" placeholder="Ex: Casado">
                            </div>
                        </div>

                        <div class="input-group full-width">
                            <label for="ocupacao">OCUPAÇÃO</label>
                            <input type="text" id="ocupacao" placeholder="Ex: Arquiteto">
                        </div>
                    </div>

                    <!-- Coluna da Direita (Dados socioeconômicos e residência) -->
                    <div class="form-right-col">
                        <div class="input-group">
                            <label for="filhos">NÚMERO DE FILHOS</label>
                            <input type="text" id="filhos" placeholder="Ex: 0">
                        </div>

                        <div class="input-group">
                            <label for="moradia">TIPO DE MORADIA</label>
                            <input type="text" id="moradia" placeholder="Ex: Casa Própria">
                        </div>

                        <div class="input-group">
                            <label for="renda">RENDA FAMILIAR</label>
                            <input type="text" id="renda" placeholder="Ex: R$ 4.500,00">
                        </div>

                        <div class="input-group">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00">
                        </div>

                        <div class="input-group">
                            <label for="residem-juntas">PESSOAS QUE RESIDEM JUNTAS</label>
                            <input type="text" id="residem-juntas" placeholder="Ex: 3">
                        </div>
                    </div>

                </div>

                <!-- Seção Inferior do Formulário (Endereço e Contato) -->
                <div class="form-bottom-row three-cols">
                    <div class="input-group">
                        <label for="medico">MÉDICO TITULAR</label>
                        <input type="text" id="medico" placeholder="Ex: João da Silva Santos">
                    </div>
                    <div class="input-group">
                        <label for="naturalidade">NATURALIDADE</label>
                        <input type="text" id="naturalidade" placeholder="Ex: Brasileiro">
                    </div>
                    <div class="input-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000">
                    </div>
                </div>

                <div class="form-bottom-row two-cols-large">
                    <div class="input-group">
                        <label for="email">E-MAIL</label>
                        <input type="email" id="email" placeholder="Exemplo@gmail.com">
                    </div>
                    <div class="input-group">
                        <label for="endereco">ENDEREÇO</label>
                        <input type="text" id="endereco" placeholder="Rua, número, bairro">
                    </div>
                </div>

                <!-- RODAPÉ DE AÇÕES COM BARRA DE PROGRESSO -->
                <footer class="form-actions-footer">
                    <div class="pagination-container">
                        <div class="progress-bar-wrapper">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="dots-indicator">
                            <span class="dot active"></span>
                            <span class="dot"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn-continue">
                        CONTINUAR <span class="arrow">→</span>
                    </button>
                </footer>

            </form>
        </main>

    </div>

</body>
</html>
