<!DOCTYPE html>
<html lang="pt-BR" class="pagina-login">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicatriza+ - Login</title>
    <link rel="stylesheet" href="style.css">
  
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pagina-login">

    <main class="login-container">
        <div class="logo-header">
            <div class="logo-icon">
                <img src="/img/logocicatriza.jpeg" /> 
            </div>
            <p class="subtitle">Sistema de gestão de feridas</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="input-group">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <div class="forgot-password">
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn btn-primary">Entrar no sistema</button>
            <button type="button" class="btn btn-secondary">Criar nova conta</button>
        </form>

        <footer class="form-footer">
            <p>Acesso exclusivo para profissionais de saúde</p>
        </footer>
    </main>

</body>
</html>
