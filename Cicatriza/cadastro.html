<!DOCTYPE html>
<html lang="pt-BR" class="pagina-cadastro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cicatriza+ - Criar Conta</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importação da fonte Montserrat -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="pagina-cadastro">

    <main class="register-container">
        <!-- Ícone e Cabeçalho -->
        <header class="register-header">
            <div class="user-icon-badge">
               <img src="img/logocicatriza.jpeg" alt="Logo Cicatriza" class="logo-img">
            </div>
            <h2>Criar conta</h2>
            <p class="subtitle">Preencha seus dados de profissional</p>
        </header>

        <!-- Formulário de Cadastro -->
        <form class="register-form">
            
            <!-- Campo Inteiro: Nome -->
            <div class="input-group full-width">
                <label for="nome">NOME COMPLETO</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <!-- Linha Dupla: CPF e Data de Nascimento -->
            <div class="form-row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group">
                    <label for="nascimento">DATA DE NASCIMENTO</label>
                    <input type="text" id="nascimento" placeholder="DD/MM/AAAA" required>
                </div>
            </div>

            <!-- Linha Dupla: E-mail e Telefone -->
            <div class="form-row">
                <div class="input-group">
                    <label for="email">E-MAIL</label>
                    <input type="email" id="email" placeholder="Exemplo@gmail.com" required>
                </div>
                <div class="input-group">
                    <label for="telefone">TELEFONE</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                </div>
            </div>

            <!-- Campo Inteiro: COREN -->
            <div class="input-group full-width">
                <label for="coren">REGISTRO PROFISSIONAL (COREN)</label>
                <input type="text" id="coren" placeholder="Digite seu número do COREN" required>
            </div>

            <!-- Linha Dupla: Senhas -->
            <div class="form-row">
                <div class="input-group">
                    <label for="senha">SENHA</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                </div>
                <div class="input-group">
                    <label for="confirmar-senha">CONFIRMAR SENHA</label>
                    <input type="password" id="confirmar-senha" placeholder="Repita sua senha" required>
                </div>
            </div>

            <!-- Aviso Informativo -->
            <div class="info-box">
                <p>A confirmação de e-mail será enviada após o cadastro</p>
            </div>

            <!-- Botão de Ação -->
            <button type="submit" class="btn-submit">Concluir cadastro</button>
        </form>

        <!-- Link para voltar ao Login -->
        <footer class="register-footer">
            <p>Já tem conta? <a href="#">Entrar</a></p>
        </footer>
    </main>

</body>
</html>
